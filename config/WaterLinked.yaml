/**:
    ros__parameters:
        feature_extract_enable: false 
        point_filter_num: 4           
        max_iteration: 10             
        filter_size_surf: 0.05    
        filter_size_map: 0.05      
        cube_side_length: 10.0       
        runtime_pos_log_enable: false # true writes pose log to disk; false disables logging
        debug_metrics_enable: true    # enables concise per-N-frame debug metrics for tuning
        debug_metrics_interval: 10    # emit debug metrics every N frames
        # map_file_path: "/home/attia/bags/dvl/rosbag2_2025_12_18-16_05_57/map.pcd"    # map save/load path; change to redirect outputs

        common:
            lid_topic:  "/sonar_point_cloud"
            imu_topic:  "/auv/imu/data_raw"
            time_sync_en: true         # ONLY turn on when external time synchronization is really not possible
            time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                        # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

        preprocess:
            lidar_type: 5                # 1: Livox, 2: Velodyne, 3: Ouster, 4: Mid360, 5: WaterLinked solid-state
            scan_line: 32                # number of scan lines of the LiDAR 
            blind: 0.2
            scan_rate: 100         


        mapping:
            acc_cov: 0.1
            gyr_cov: 0.1
            b_acc_cov:  0.0001
            b_gyr_cov:  0.0001

            fov_degree: 90.0    # lidar horizontal FOV used for map segmentation
            det_range: 5.0     # max range of lidar points considered; raise to keep farther points, lower to ignore distant returns
            extrinsic_est_en:  false    # enable extrinsic estimation (true) or use fixed extrinsic (false)          

            extrinsic_T: [ 0.0, 0.0, 0.0 ]
            extrinsic_R: [ 1., 0., 0.,
                        0., 1., 0.,
                        0., 0., 1.0]
 
            process_noise:
                nv:  1e-7   # linear acceleration process noise
                nw:  1e-7  # angular acceleration process noise
                nbg:  1e-8 # gyro bias random-walk (lower to restrain bias wander)
                nba: 1e-8  # accel bias random-walk (lower to restrain bias wander)
                nb_dvl:  0.1 # DVL bias random-walk

        dynamics:
            enable: false
            config_name: "BlueROV"  # model name used by the dynamics model internals
            config_path: "/home/jetson/bluerov_ws/src/FAST_LIO_GPU_UW/config/BlueROV.conf"  # full path to libconfig .conf file
            forces_topic: "/auv/forces_desired"
            model_trust: 1.0 # 1.0 = fully trust dynamics, 0.0 = ignore dynamics
            thruster_meas_en: true    # use dynamics-based pseudo-accel as a measurement update
            thruster_acc_cov: 1.0     # covariance for thruster-accel pseudo-measurement (m/s^2)^2

        dvl:
            enable: true
            topic: "/auv/dvl"
            extrinsic_T: [ 0.0, 0.0, 0.0 ]
            extrinsic_R: [ 1., 0., 0.,
                        0., 1., 0.,
                        0., 0., 1.]
            covariance_floor_std: 0.0000001
            min_speed: 0.0

        frames:
            map_frame: "World"
            odom_frame: "camera_init"
            body_frame: "body"

        publish:
            path_en:  true
            scan_publish_en:  true       # false: close all the point cloud output
            dense_publish_en: true       # false: low down the points number in a global-frame point clouds scan.
            scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame
            map_en: true                 # enable map accumulation so /map_save writes a populated PCD

        map_file_path: "/home/attia/bags/no dvl/rosbag2_2025_12_18-16_37_38$"
        pcd_save:
            pcd_save_en: true
            interval: -1   # one file; use N to split every N scans
