/**:
    ros__parameters:
        feature_extract_enable: true 
        point_filter_num: 1       
        max_iteration: 8
        filter_size_surf: 0.2
        filter_size_map: 0.2
        cube_side_length: 5.0
        runtime_pos_log_enable: false # true writes pose log to disk; false disables logging
        common:
            lid_topic:  "/sonar_point_cloud"
            imu_topic:  "/auv/imu/data_raw"
            time_sync_en: true        # ONLY turn on when external time synchronization is really not possible
            time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                        # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

        preprocess:
            lidar_type: 5                # 1: Livox, 2: Velodyne, 3: Ouster, 4: Mid360, 5: WaterLinked solid-state
            scan_line: 32                # number of scan lines of the LiDAR 
            blind: 0.2    


        mapping:
            acc_cov: 0.0001
            gyr_cov: 5.0e-6
            b_acc_cov:  0.0001
            b_gyr_cov:  0.0001

            fov_degree: 90.0    # lidar horizontal FOV used for map segmentation
            det_range: 15.0
            extrinsic_est_en:  false    # enable extrinsic estimation (true) or use fixed extrinsic (false)          

            extrinsic_T: [ 0.09382, -0.02148, 0.11593 ] #Lidar_T_wrt_IMU in meters; from CAD model, but can be refined by extrinsic estimation if enabled
            extrinsic_R: [ 0.965925826, 0.0, 0.258819045,
                            0.0,         1.0, 0.0,
                            -0.258819045, 0.0, 0.965925826 ]
 
            process_noise:
                nv:  1.0e-1   # linear acceleration process noise
                nw:  1.0e-1  # angular acceleration process noise
                nbg:  1.0e-6 # gyro bias random-walk (lower to restrain bias wander)
                nba: 0.0001  # accel bias random-walk (lower to restrain bias wander)
                nb_dvl:  0.0001 # DVL bias random-walk
                nb_pressure: 0.0001 # pressure-depth bias random-walk (m^2/s)

        dynamics:
            enable: true
            config_name: "BlueROV"  # model name used by the dynamics model internals
            config_path: "/home/jetson/bluerov_ws/src/FAST_LIO_GPU_UW/config/BlueROV.conf"  # full path to libconfig .conf file
            forces_topic: "/auv/forces_desired"
            model_trust: 1.0 # 1.0 = fully trust dynamics, 0.0 = ignore dynamics
            thruster_meas_en: false   # use dynamics-based pseudo-accel as a measurement update
            thruster_acc_cov: 1.0     # covariance for thruster-accel pseudo-measurement (m/s^2)^2

        dvl:
            enable: true   
            topic: "/auv/dvl"
            extrinsic_T: [ -0.079, -0.09691, -0.25938 ] # DVL_T_wrt_IMU in meters; from CAD model, but can be refined by extrinsic estimation if enabled
            extrinsic_R: [ 1., 0., 0.,
                        0., 1., 0.,
                        0., 0., 1.]
            covariance_floor_std: 0.05
            min_speed: 0.0
            hold_last_measurement: true
            hold_max_age_sec: 1.0

        pressure:
            enable: true
            topic: "/auv/pressure/scaled2"
            extrinsic_T: [ -0.24219, -0.03954, 0.01898] # pressure sensor position wrt IMU frame [m]
            covariance_floor_std: 0.1
            reference_pressure_pa: 103850.0

        loop_closure:
            enable: true
            frontend_frame_topic: "/fastlio/frontend_frame"
            frontend_frame_stride: 2
            keyframe_id_topic: "/fastlio/keyframe_id"
            keyframe_path_topic: "/fastlio/keyframe_path"
            keyframe_map_topic: "/fastlio/keyframe_map"
            optimized_path_topic: "/fastlio/optimized_path"
            optimized_keyframes_topic: "/fastlio/optimized_keyframes"
            optimized_map_topic: "/fastlio/optimized_map"
            optimized_odom_topic: "/fastlio/optimized_odom"
            map_to_odom_topic: "/fastlio/map_to_odom"
            loop_marker_topic: "/fastlio/loop_candidate_constraints"
            loop_candidate_current_topic: "/fastlio/loop_candidate_current"
            loop_candidate_history_topic: "/fastlio/loop_candidate_history"
            loop_candidate_registered_topic: "/fastlio/loop_candidate_registered"
            keyframe_meter_gap: 2.0
            keyframe_deg_gap: 10.0
            frontend_frame_cache_size: 256
            frontend_feedback_enable: true
            feedback_min_translation: 0.10
            feedback_min_yaw_deg: 0.5
            feedback_pose_position_cov: 1.0e-4
            feedback_pose_rotation_cov: 1.0e-4
            feedback_cross_cov_scale: 0.25
            feedback_rebuild_search_num: 10
            history_keyframe_search_radius: 5.0
            history_keyframe_search_time_diff: 30.0
            history_keyframe_search_num: 10
            loop_closure_frequency: 1.0
            icp_process_frequency: 1.0
            map_publish_frequency: 0.5
            keyframe_downsample_leaf: 0.4
            map_downsample_leaf: 0.4
            icp_max_correspondence_distance: 15.0
            icp_max_iterations: 100
            loop_fitness_score_threshold: 0.1
            max_loop_correction_translation: 1.5 # set <= 0.0 to disable this guard
            graph_update_times: 2
            odom_noise_rotation: 1.0e-6
            odom_noise_translation: 1.0e-4
            loop_noise_score: 0.5
            optimized_child_frame: "aft_pgo"

        frames:
            map_frame: "World"
            odom_frame: "camera_init"
            body_frame: "body"

        publish:
            path_en:  true
            scan_publish_en:  true       # false: close all the point cloud output
            dense_publish_en: true      # false: low down the points number in a global-frame point clouds scan.
            scan_bodyframe_pub_en: false  # true: output the point cloud scans in IMU-body-frame
            blind_max: 15.0               # max range [m] for published registered clouds; <=0 disables max cutoff
            map_en: true                # enable map accumulation so /map_save writes a populated PCD
            imu_driven_propagation: true # publish /Odometry at IMU rate when no LiDAR scans are available

        map_file_path: "/home/attia/bags/fastlio_map.pcd"
        pcd_save:
            pcd_save_en: true
            interval: -1   # one file; use N to split every N scans
